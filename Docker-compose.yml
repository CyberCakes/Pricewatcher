version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: pricewatcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/pricewatcher
      REDIS_URL: redis://redis:6379/0

  celery:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --beat
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data: